# Modern Android Project Template — Product Requirements Document

> **Version:** 1.1 · **Date:** 2026-06-21 · **Status:** Approved for build
> **Upstream:** [`docs/IDEATION.md`](./IDEATION.md). This PRD is the **single source of truth** — the stack-validation decision record and the RFC proposals have been folded in and removed.
> **v1.1 change:** the repository is split into two runnable targets — an **opinionated & complete base starter** (`:app`) and a **Twitter-lite demo** (`:demo:twitter:*`). Supabase + all social domain live only in the demo; the base is opinionated: Firebase, Measure, Ads, and Branch are part of the base stack and require local service configuration (see §1, §6, Appendix B).
> All library versions reflect June 2026 research. Entries marked **†** in Appendix A must be pinned to latest stable at implementation time.

---

## 1. Overview

A production-grade, modular Android **reference template** that scaffolds new apps with the current (2026) recommended architecture, libraries, tooling, testing, performance, and CI/CD already wired. It is one repository and one Gradle build with **two runnable app targets**:

1. **Base starter (`:app`)** — the **opinionated & complete** template a team keeps. It proves the full stack — app shell, theming, Nav3, DI, settings, devtools, observability, push transport, ads, deep links, in-app update/review, feature flags, account deletion, **Credential Manager (username/password) auth**, and one **generic sample feature** (a posts/users browser) — with DummyJSON for the sample/auth backend and real Firebase, Measure, Ads, and Branch integrations configured from local secrets. It **builds and runs after required local service configuration is supplied; credentials are never committed**.
2. **Twitter-lite demo (`:demo:twitter:*` + `:demo:twitter:app`)** — a full-stack **showcase** of the same foundation under realistic feature pressure: Supabase auth/PostgREST/realtime/storage/RLS, Google SSO + passkey (P1), social features (feed/post/profile/search/notifications), onboarding, and an optional dynamic-feature image cropper.

**The base is the template you keep; the demo is the showcase you study, copy patterns from, run, or delete.** The guiding rule: **reusable base modules are opinionated & complete (best-practice modules a competent app needs), but domain-isolated — product-specific code (anything social — post, comment, like, follow, feed, activity) lives only in the demo boundary.** Supabase and the entire social domain are demo-only — a team forking the base for a finance, health, commerce, or productivity app inherits an opinionated Android foundation (not a neutral one), but not a social-app skeleton. Deleting `:demo:twitter:*` leaves a clean, compiling starter (SC-ISOLATION-1).

---

## 2. Goals & Non-Goals

### Goals
- **G1** — Encode current modern-Android best practice (architecture, DI, navigation, state, data, testing, performance, CI) as a working, idiomatic reference.
- **G2** — Be reusable: clean module boundaries, vendor SDKs behind interfaces, removable features, no hard-coded product assumptions.
- **G3** — Be complete: every listed feature scaffolded and demonstrated, not stubbed.
- **G4** — Be verifiable: unit + UI + design-system screenshot + E2E tests, coverage gating, baseline profiles, all green in CI.
- **G5** — Bootstrap new Android projects faster by packaging the architecture, stack integrations, quality gates, and setup checklist into a reusable starter.
- **G6** — **Keep the reusable base opinionated & complete, with the demo isolated.** The base is intentionally opinionated — auth, push, playservices, observability, ads, deep links, and devtools are best-practice modules a competent app needs, not optional extensions; reusability comes from clone-and-build + module removability, not from being product-neutral. `:core:*` and base `:feature:*` must not expose social/Twitter-lite concepts; the base starter uses required local service configuration with **no committed credentials**; removing `:demo:twitter:*` leaves the base compiling and green (SC-ISOLATION-1/2).

### Non-Goals
- **NG1** — Kotlin Multiplatform / Compose Multiplatform support (Android-only by decision).
- **NG2** — A polished consumer product. The demo is a stack showcase.
- **NG3** — **Custom backend for the demo, beyond Supabase.** *(Demo scope only — the base starter has no first-party backend; it reads the public DummyJSON API, §5/§8.)* The demo's backend is Supabase-managed schema, RLS policies, triggers, RPCs, storage bucket config, and **one `send-push` Edge Function (Deno) for FCM delivery** (no separate custom server). **Supabase-only is an intentional demo boundary**, valid while the backend stays within authenticated CRUD, RLS reads/writes, simple RPCs, storage-ownership rules, realtime, trigger-driven side effects, and a single thin Edge Function. Mobile CI does not own backend policy/function testing; it validates the mobile-facing contract through app tests and a small app smoke. Escalate to **a custom backend** when any gate trips: `service_role` needed outside tightly-scoped SQL; background jobs needing queues/retries/DLQ; notification fanout beyond the single `send-push` Edge Function; server-side media processing (resize/scan/moderation); privileged moderation/admin; search needing ranking/typo-tolerance beyond Postgres; external private-API credentials; or RLS/RPC logic too complex to test safely (§17).
- **NG4** — iOS, Wear, TV, Auto. (Adaptive support **is** in scope as P0 — window size classes, `NavigationSuiteScaffold`, edge-to-edge, one list-detail showcase, §8.12 — but bespoke large-screen/foldable UX beyond that, e.g. multi-pane everywhere, stylus, drag-and-drop, desktop windowing, is out.)
- **NG5** — Multi-language content; i18n *plumbing* is included, translations are not.
- **NG6** — **Product-specific domain in the base.** Social nouns (post, comment, like, follow, feed, activity, profile) and Supabase are **out of scope for `:core:*` and base `:feature:*`** — they belong only inside `:demo:twitter:*`. The base sample feature is a deliberately generic posts/users browser, not a social graph.

---

## 3. Target Users & Use Cases

| User | Use case |
|---|---|
| Senior/lead Android engineer | Forks the base starter; keeps architecture + CI; studies the demo for patterns; deletes `:demo:twitter:*`; builds their product. |
| Mid-level engineer | Learns idiomatic 2026 patterns from both the runnable base and the full demo. |
| Team starting greenfield | Standardizes on one architecture + tooling baseline; keeps the opinionated & complete base, treats the demo as a worked example. |

**Primary flow:** clone → add required local service config (Firebase `google-services.json`, Measure key, AdMob IDs, Branch key) using the per-environment file layout → `./gradlew :app:assembleDevDebug` runs the **base starter** (DummyJSON-backed auth + sample, real platform/vendor stack configured locally) → optionally configure + run the **`:demo:twitter:app`** with separate demo service projects to study the full Supabase/social showcase → copy the patterns you need → **delete `:demo:twitter:*`** → build your product on the clean base.

---

## 4. Success Criteria

- **SC1** — `./gradlew :app:assembleDevDebug` succeeds after required local service configuration is supplied through ignored local files or CI secrets; no credentials are committed.
- **SC-STARTER-1** — The base starter runs end-to-end with required service config present: Credential Manager username/password sign-in against **DummyJSON** (token persisted, refresh, logout) → the sample **posts/users browser** lists, paginates, opens detail, and searches (Room-cached) → settings (theme/language), dev/staging devtools, Firebase, Measure, Ads, and Branch-backed deep links initialize through local credentials; prod excludes devtools implementation and local override bindings.
- **SC2** — `./gradlew check` runs Spotless, detekt, Android Lint, unit tests, Roborazzi, and Kover with the configured gates passing (base + demo).
- **SC-DEMO-1** — Twitter-lite demo (`:demo:twitter:app`) builds and runs as a **manual/product showcase** with documented demo service setup: sign in with **Google SSO** → (first run) choose a unique username → browse a paged feed → open a post and its comment thread → reply, like/unlike, follow/unfollow → search people and posts → view and edit a profile → compose a post with up to 4 images — all against live Supabase.
- **SC-DEMO-E2E** — Automated demo E2E is intentionally small: seeded `dev`/`staging` Supabase email/password test-auth → feed visible → open post detail. Google SSO/passkey and broader social actions are manual/provider-smoke or lower-level tests, not Maestro gates.
- **SC-ISOLATION-1** — Removing `:demo:twitter:*` (drop the includes in `settings.gradle.kts` + demo config/docs) leaves the base starter compiling and `:app` checks passing.
- **SC-ISOLATION-2** — No `:core:*` or base `:feature:*` module depends on `:demo:twitter:*` (enforced by a **dependency-graph assertion test**, §10); no `:core:*` type/package or base `:feature:*:api` public API exposes social/Twitter-lite domain nouns, with an explicit denylist (`post`, `comment`, `like`, `follow`, `feed`, `activity`, `profile`) enforced by a **Konsist naming rule** (§10). Private DummyJSON DTO/entity names inside `:feature:sample:impl` are allowed when not exported.
- **SC4** — CI is green across `base`, `demo-compile`, and `pr-check`/`main-ci`. Release CI, signed AAB production, Play/Firebase App Distribution publishing, and release-time demo smoke are deferred to §22.
- **SC5** — A baseline profile is generated and bundled; a macrobenchmark startup test runs (per app target).
- **SC6** — **Two removal contracts (§6.11):** (a) **whole demo** — removing `:demo:twitter:*` leaves the base compiling (SC-ISOLATION-1); (b) **one demo feature** — removing a single `:demo:twitter:feature:*:impl`, its Koin module, and its nav registration leaves the demo app compiling; demo feature `:api` modules may remain as stable contracts when other demo features still reference their route keys.
- **SC7** — Accessibility + adaptive gates pass: ATF-backed a11y checks and Lint a11y rules green; design-system previews render correctly across theme/font-scale variants; key app screens pass targeted adaptive UI tests for compact/medium/expanded widths and 2.0× font scale; app runs edge-to-edge with predictive back.

## 6. Architecture

### 6.1 Principles
- **Two targets, one foundation:** an **opinionated & complete base** (`:app` + `:core:*` + base `:feature:*`) and a **Twitter-lite demo** (`:demo:twitter:*`) share the same architecture, design system, DI, testing, and observability abstractions. The demo proves the foundation under real feature pressure without shaping it.
- **Opinionated & complete base (G6):** `:core:*` and base `:feature:*` encode best-practice modules a competent app needs (auth, push, playservices, observability, ads, deep links, devtools) — the base is intentionally opinionated, not neutral. Reusability comes from clone-and-build + module removability. `:core:*` packages/types and base `:feature:*:api` public APIs must **not** name social nouns (post, comment, like, follow, feed, activity, profile). Supabase and all social domain live only in `:demo:twitter:*`. Private DummyJSON DTO/entity names inside `:feature:sample:impl` are allowed when not exported. Enforced by a dependency-graph assertion + Konsist naming rule (§10) and SC-ISOLATION-2.
- **Unidirectional Data Flow (UDF):** state flows down (`UiState`), events flow up (lambdas).
- **Layered data with a deliberate, per-screen cache policy:** UI → ViewModel → Repository (interface) → DataSources (network + DB). Room is the **single source of truth where offline history matters**, network-direct where data is inherently live — the choice is explicit, not blanket-cached. Concrete policies: base sample feature in §6.7; demo (feed / post / search / profile / notifications) in §9.4.
- **Modularization for build speed + ownership + decoupling**, following the Now in Android hybrid (feature + core + build-logic), **not** by-layer modules.
- **Vendor SDKs behind interfaces** in `:core` or optional modules, so apps swap/remove them in one place.
- **Dependency rule:** dependencies point inward/downward; feature modules never depend on each other's implementations; **base modules never depend on `:demo:twitter:*`.**
- **Adaptive + accessible by default (P0):** screens survive compact/medium/expanded widths, fold posture, landscape, edge-to-edge insets, predictive back, and large font scale; every interactive element carries correct semantics and a ≥48dp touch target. Not an afterthought — built into `:core:designsystem`/`:core:ui` and verified in CI (§8.12–8.13, §10).

### 6.2 Module structure

```
── BASE (opinionated & complete template; the :app target) ──────────────────────

:build-logic                  Included build — convention plugins (shared by both targets)
:core:model                   Pure Kotlin models — GENERIC only (no Post/Comment/Follow). e.g. Result payloads, paging keys
:core:common                  Dispatchers, Result<T>, extensions, safeApiCall, base utils
:core:designsystem            Ember theme, color/type/shape/spacing tokens, Outfit font, themed App* atoms
:core:ui                      Generic composite composables (list/detail scaffolds, empty/error/loading states)
:core:network                 GENERIC Ktor (OkHttp engine) client — interceptors, Bearer/auth, error mapping, serialization. NO supabase-kt
:core:database                Room AppDatabase, DAO/migration conventions (base: sample cache)
:core:datastore               Preferences + Proto datastores (settings, flag cache); encrypted token-blob persistence only, no plaintext secrets
:core:security                Android Keystore-backed encrypt/decrypt helper for auth/session secret blobs; no persistence
:core:data                    Generic repository patterns + Result; SessionProvider/AuthRepository interface + TokenStore contract
:core:domain                  Generic use cases/interactors only when coordinating repos or holding business rules; no pass-through use-case spam
:core:observability           CrashReporter, PerformanceTracer, AnalyticsLogger interfaces; Measure.sh + Firebase impls; composite; fakes for tests
:core:push                    GENERIC FCM transport — FirebaseMessagingService, channels, builder; PushMessagingRegistrar; TokenSyncWorker
:core:playservices            Play Core wrappers — AppUpdateCoordinator (in-app/force update), ReviewPrompter (in-app review)
:core:ads                     Tiny ads contracts: AdManager, ConsentManager, ad placement models; no AdMob/UMP SDK
:core:deeplink                DeepLinkResolver contracts + route/deep-link models; no Branch SDK
:core:dynamicdelivery         OPT-IN — FeatureInstaller (SplitInstallManager wrapper) + Nav3 openDynamic() + InstallingKey (DFM plumbing; excluded from default :app build)
:core:testing                 Shared fakes, rules, Koin test rule, Roborazzi config, Ktor MockEngine helpers
:feature:splash:{api,impl}    Hold until readiness (session/flags) resolves, then route — routing logic injected per target
:feature:auth:{api,impl}      Credential Manager USERNAME/PASSWORD → DummyJSON token auth (access+refresh via TokenStore, logout)
:feature:account:{api,impl}   Account deletion flow (confirm → delete → clear session)
:feature:sample:{api,impl}    GENERIC posts/users browser (DummyJSON): list → detail, search, offset-paged, Room-cached
:feature:settings:{api,impl}  Theme / dynamic color / language, logout, account-deletion entry, force/in-app update entry, review trigger

:ads                          Base AdMob + UMP implementation of :core:ads contracts; removable/swappable
:deeplink-branch              Branch.io implementation of :core:deeplink contracts for deferred deep links; App Links baseline remains
:app-catalog                  OPTIONAL — standalone design-system showcase APK (NiA-style); skeleton, off by default
:macrobenchmark               com.android.test — baseline profile generator + benchmarks

── DEMO (Twitter-lite showcase; the :demo:twitter:app target — deletable) ────
:demo:twitter:app             Demo app — wires base features with REAL Supabase bindings + social features
:demo:twitter:supabase        supabase-kt client (Ktor) — auth / postgrest / realtime / storage; the Supabase integration the base lacks
:demo:twitter:model           Social domain models (Post, Profile, Comment, Like, Follow, Notification)
:demo:twitter:network         Social @Serializable DTOs, PostgREST queries, RPC calls (over :demo:twitter:supabase)
:demo:twitter:database        Social Room entities/DAOs (feed cache, notifications)
:demo:twitter:data            Social repos: Post/Comment/Like/Follow/Profile/Search/Notification + real AuthRepository (Supabase) binding
:demo:twitter:feature:auth:{api,impl}          Google SSO (federated) + passkey (P1) → Supabase session
:demo:twitter:feature:onboarding:{api,impl}    Post-SSO profile completion gate (unique username + display name; complete_profile RPC)
:demo:twitter:feature:feed:{api,impl}          Home feed (Paging 3 + Supabase + realtime), like, compose FAB entry
:demo:twitter:feature:post:{api,impl}          Post detail + comment thread + inline reply; compose-post (text + ≤4 images)
:demo:twitter:feature:profile:{api,impl}       Profile view, edit profile, follow/unfollow, followers/following lists
:demo:twitter:feature:search:{api,impl}        Search people + posts (debounced)
:demo:twitter:feature:notifications:{api,impl} In-app activity feed (likes/follows/comments), unread badge, mark-read

```

**Module types & layering.** Five kinds of module, each with a fixed role and a one-directional dependency rule:

| Type | Modules | May depend on | Never depends on |
|---|---|---|---|
| **App** | `:app`, `:demo:twitter:app` | `:feature:*:impl` (own target), optional modules, `:core:*` | — (top of the graph) |
| **Base feature** | `:feature:*` (`:api` + `:impl`) | own `:api`, other base features' `:api`, `:core:*` | another feature's `:impl`, **any `:demo:twitter:*`** |
| **Core** | `:core:*` | lower `:core:*` | any `:feature:*`, `:app`, **any `:demo:twitter:*`** |
| **Demo** | `:demo:twitter:*` | `:core:*`, base `:feature:*:api`, own demo modules' `:api` | another demo feature's `:impl` |
| **Build/Test** | `:build-logic`, `:macrobenchmark` | — (build-only / test-only) | runtime modules |

**Cross-feature navigation** goes only through `:api` modules, which expose Nav3 keys + entry contracts (depending only on the relevant `:*:model`). An `:impl` navigates to another feature by referencing that feature's `:api` key — never its `:impl` (shown for the demo's social features):

### 6.3 Presentation pattern (UDF-MVVM)

```kotlin
data class FeedUiState(
    val isRefreshing: Boolean = false,
    val userMessage: String? = null,        // transient; cleared after shown
)

class FeedViewModel(pager: FeedPager, private val likes: LikeRepository) : ViewModel() {
    val posts = pager.flow.cachedIn(viewModelScope)            // Flow<PagingData<Post>>
    private val _uiState = MutableStateFlow(FeedUiState())
    val uiState = _uiState.asStateFlow()

    fun onLike(id: Long) = viewModelScope.launch {
        likes.toggle(id).onFailure { e -> _uiState.update { it.copy(userMessage = e.message) } }
    }
    fun onMessageShown() = _uiState.update { it.copy(userMessage = null) }
}
```

- **State holder:** one immutable `data class` (or `sealed interface` when screens have structurally distinct Loading/Success/Error trees).
- **`stateIn`** with `SharingStarted.WhileSubscribed(5_000)` for derived flows.
- **One-time events** (navigation, snackbar) are modeled as nullable/list state fields consumed in `LaunchedEffect` then cleared — **never** `Channel`/`SharedFlow` (per Google UI-events guidance).
- **Composables** receive `state` + lambdas; never the ViewModel below the screen entry.

### 6.4 DI (Koin, runtime DSL)
- One Koin module per feature `:impl` and per `:core` module; `:app` calls `startKoin { modules(allModules) }`.
- `koinViewModel()` in composables; `workManagerFactory()` for workers (`TokenSyncWorker` in `:core:push`; demo's `PostImageUploadWorker` in `:demo:twitter:feature:post:impl` — both `CoroutineWorker`); `koin-compose-navigation3` for nav entries.
- Runtime DSL (no annotations/KSP per module). A `checkModules()` test verifies the graph.
- **Why Koin over Hilt:** runtime DSL avoids the Dagger-subcomponent restructuring required for dynamic feature modules (DFM) — Dagger's compile-time graph cannot resolve DFM dependencies without subcomponent refactoring, while Koin's runtime module loading (`loadKoinModules`/`unloadKoinModules`) handles DFM install/uninstall natively (§6.10). Tradeoff: runtime graph validation (via `checkModules()` test) instead of compile-time safety.

### 6.5 Navigation (Nav3)
- Back stack = `SnapshotStateList<Any>` owned by an app-scoped `Navigator`.
- `NavDisplay(backStack, onBack, entryProvider = getEntryProvider())` at the root.
- Each feature contributes entries via its Koin module (`navigation<HomeKey> { HomeScreen() }`).
- Multiple back stacks for bottom-nav sections per the Nav3 recipes.
- **Glue replaceability:** the nav *contract* (`:api` keys + entry definitions) depends only on Nav3, not on `koin-compose-navigation3`. If the Koin-nav glue lags a Nav3 release, fall back to plain Nav3 entry providers with manual Koin `get()` in the entry lambda — no feature code changes. (The two are Renovate-grouped to co-bump; see §13.)
- **Profile-completion gate:** an app-level check (session present + does a `profiles` row exist for `auth.uid()`) routes first-run users to `ProfileSetupKey` before the tab scaffold; incomplete users cannot reach any feature route (§9, Demo onboarding). Google SSO and (future P1) passkey sign-in both funnel through this one gate. (This gate is demo-only; the base starter routes splash → auth → sample home.)

### 6.6 Error handling
- `sealed interface Result<out T> { Success; Error }` at the data/domain boundary via a `safeApiCall {}` wrapper that maps `HttpException`/`IOException`/Supabase errors to typed domain errors.
- `sealed interface UiState<out T> { Loading; Success; Error }` at the UI boundary. Loading belongs to UI, not to a network result — do not collapse the two.
- No `kotlin.Result`; no Arrow (may be added per-app later).

### 6.7 Data access

**Base — generic REST (DummyJSON).** `:core:network` is a **generic Ktor `HttpClient` on the OkHttp engine** (interceptors, Bearer/auth header, error mapping to `Result`, kotlinx.serialization) — **no supabase-kt**. It shares one `OkHttpClient`/connection pool with Coil (keeps Measure.sh HTTP auto-capture working). Feature-specific `@Serializable` DTOs live in each base feature's data layer and map to generic models before crossing into the repository; DTOs never leak past the network layer.
- **Auth (`:feature:auth`):** Credential Manager retrieves a saved username/password → `POST /auth/login` (DummyJSON) → access+refresh JWT stored through `TokenStore`; production binding encrypts with Android Keystore before persistence, so DataStore/private storage never contains plaintext tokens. A Bearer interceptor attaches the token; silent refresh on 401 via `/auth/refresh`; `/auth/me` bootstraps the session on launch.
- **Sample (`:feature:sample`):** `/posts` + `/users` via the generic client; **Room is the SSOT** (list cached + offset-paged via Paging 3 + RemoteMediator), detail by id, debounced search. DummyJSON writes are simulated (not persisted) → the sample is read-focused; any "create" is local-only and documented. Demonstrates the full network→Room→repo→VM→UI path without a first-party backend.
- **CI/tests** use Ktor `MockEngine` with recorded DummyJSON payloads — never the live API.

**Demo — PostgREST via supabase-kt** (in `:demo:twitter:*`).
- **Single data path:** all social data (feed, posts, likes, follows, profile reads/writes) uses supabase-kt `postgrest-kt` over **Ktor** (no Retrofit), in `:demo:twitter:supabase`/`:network`/`:data`. The enriched home feed is the `get_home_feed` RPC (handles `auth.uid()` for `liked_by_me`).
- **DTOs + mapping:** `@Serializable` DTOs live in `:demo:twitter:network`, mapped to `:demo:twitter:model` before crossing into `:demo:twitter:data`.
- **HTTP engine + caching:** supabase-kt's Ktor `HttpClient` runs on the OkHttp engine, sharing the pool with Coil. Response caching available but off by default — Room (data) + Coil (images) are the real caches.
- **GraphQL (optional showcase — see §17):** Supabase ships `pg_graphql`, but it has **no subscriptions** and maps per-user computed fields (`liked_by_me`) awkwardly, so realtime/auth/storage stay on supabase-kt regardless. A GraphQL data source would sit in `:demo:twitter:network` behind the same repository interface as the PostgREST one — structurally identical — so a fork can add it (Apollo + `.graphql`) with no architectural change.

### 6.9 Service / platform facades

**Principle: facades wrap service/platform edges, not every dependency.** A facade is justified only where an SDK brings vendor lock-in, credentials, global state, callbacks, lifecycle side effects, or test-hostile (final/listener) APIs. Common Jetpack/Kotlin libraries are used **directly** (or hidden by normal repository/data-source boundaries) — **do not** add generic facades for Compose, Material 3, Navigation 3, Koin, Coroutines/Flow, Paging, Room, DataStore, WorkManager, Ktor/supabase-kt, Coil, or Credential Manager. Feature-local wrappers/data sources for lifecycle/testability are allowed inside an impl module, but they are not shared `:core` facades. Transport/persistence stays behind data sources: supabase-kt DTOs → remote data source, Room entities/DAOs → local data source.

Facade inventory (interface → module → backing SDK):

| Interface | Module | Backs | Notes |
|---|---|---|---|
| `CrashReporter` | `:core:observability` | Measure.sh + Firebase Crashlytics | **Composite** runs both (comparison); flip to one binding for prod. |
| `PerformanceTracer` | `:core:observability` | Measure.sh + Firebase Performance | HTTP auto-captured (Measure interceptor); composite as above. |
| `AnalyticsLogger` | `:core:observability` | Firebase Analytics | Product event logging; `NoOp` for tests/opt-out. |
| `FeatureFlagProvider` | `:core:data` (+ `:core:datastore`) | Firebase Remote Config | Cached to Proto DataStore; typed `Flow`s (§8.7). |
| `PushMessagingRegistrar` | `:core:push` | FCM | Token/topic registration; Service stays concrete. |
| `TokenStore` | `:core:data` contract; production binding composes `:core:datastore` + `:core:security` | Android Keystore-backed encryption before persistence | Auth/session secrets only; user preferences remain normal DataStore; Remote Config cache and devtools local flag overrides stay non-backed-up runtime state. |
| `AppUpdateCoordinator` | `:core:playservices` | Play Core `AppUpdateManager` + Remote Config | Update/force-update policy (§8.5). |
| `ReviewPrompter` | `:core:playservices` | Play Core `ReviewManager` | In-app review opportunities (§8.6). |
| `AdManager` | `:core:ads` contract; `:ads` implementation | AdMob | Included by default via `:ads`; `NoOpAdManager` for tests or forks that remove ads (§8.8). |
| `ConsentManager` | `:core:ads` contract; `:ads` implementation | UMP | Consent before `MobileAds.initialize()`; settings/privacy-options can depend on contract without pulling UMP SDK. |
| `DeepLinkResolver` | `:core:deeplink` contract; `:deeplink-branch` implementation | App Links / Branch | Branch included by default for deferred deep links; App Links remain baseline (§8.9). |

All facade **interfaces** above are **base** (`:core:*`). Bindings differ by target and environment: the base starter binds real Firebase/Measure/Ads/Branch/Play implementations configured from ignored local files or CI secrets, while tests can bind fakes; the demo adds Supabase-backed bindings for its social domain. The `AuthRepository`/`SessionProvider` abstraction is base; its **DummyJSON** binding ships in base `:feature:auth`, its **Supabase** binding in `:demo:twitter:data`. Supabase itself is reached only through demo repositories/data sources — that *is* its facade; there is no monolithic "SupabaseFacade", and no Supabase type appears in any base module.

### 6.10 Dynamic feature delivery (optional demo showcase)

The **demo** demonstrates **Play Feature Delivery** with **one** small on-demand module — **`:demo:twitter:feature:imagecrop`**, an image cropper fetched the first time a user crops a selected image in the compose-post flow. The *feature* is deliberately trivial (crop only); the point is to encode the **DFM pattern** correctly. The **plumbing** (`:core:dynamicdelivery`) is **opt-in base infrastructure** — excluded from the default `:app` build, included only when a team adds a dynamic feature; the **cropper** is demo. It is **optional, advanced, and removable** (delete `:demo:twitter:feature:imagecrop:impl` + its `:api` + flip the compose-post flow to attach without crop).

**This is isolated, not pervasive** — non-DFM features, the dependency rule, and normal navigation are unchanged. Three contained, additive touchpoints:

1. **Module shape (one inverted edge, quarantined).** `:demo:twitter:feature:imagecrop:api` (the `CropContract`/`CropContract.Provider` interface + `CropKey`) lives in the demo base like any `:api` module. `:demo:twitter:feature:imagecrop:impl` is a `com.android.dynamic-feature` module that `implementation(project(":demo:twitter:app"))` and implements the contract. `:demo:twitter:app` lists it under `android { dynamicFeatures += setOf(":demo:twitter:feature:imagecrop:impl") }` — **not** as a normal dependency. Nothing compile-depends on the impl; it resolves at runtime via **one reflection call** (`Class.forName(...).kotlin.objectInstance as CropContract.Provider`) after `installedModules()` confirms it. ServiceLoader is **not** used (dropped by R8).

2. **DI (Koin, our advantage).** The dynamic `:impl` defines a Koin module; on `INSTALLED`, `:core:dynamicdelivery` calls `loadKoinModules(...)` (module object reached via the one-reflection Provider) and `unloadKoinModules` on teardown. Guard double-load on config change (else `DefinitionOverrideException`). Koin's runtime DSL sidesteps the Dagger-subcomponent incompatibility that forces other teams to restructure DI for DFM.

3. **Navigation (Nav3, bespoke gate in `:core:dynamicdelivery`).** Nav3 has no built-in DFM support, so the base plumbing owns a small generic gate: `navigator.openDynamic(CropKey, module="imagecrop")` → if installed, push `CropKey` normally; else push a base-resident **`InstallingKey`** (progress screen) that drives `FeatureInstaller`, then on `INSTALLED` loads the DFM Koin module (registering the real `navigation<CropKey>{…}`) and swaps `InstallingKey` → `CropKey`. The owned `Navigator`/`NavDisplay`/entryProvider design and every normal `navigator.push(key)` are untouched; this helper is reused by any future DFM.

**`:demo:twitter:app`-only bits** (unavoidable, build-level): the `dynamicFeatures` config line + `SplitCompat.install()` in its `Application` (and `SplitCompat.installActivity()` if the crop hosts its own Activity) so DFM classes/resources load post-install.

**Testing:** `FeatureInstaller` is injected behind an interface → **`FakeSplitInstallManager`** (`setShouldNetworkError(true)` for failure paths) in instrumented tests; Robolectric mocks the interface. Real on-demand install is verified via **`bundletool --local-testing`** / Play internal app sharing — **never the IDE** (which always reports the module as installed). CI exercises the Fake/local-testing paths; the live Play delivery path is not CI-gated (accepted gap).

**Why it's optional:** in 2026, on-demand DFM is justified mainly by large base size or size-sensitive markets; for twitter-lite the size win is modest. Most heavily-modular apps (NiA, Uber, Spotify, Dropbox) ship App Bundle **config splits** and skip on-demand feature splits. Documented as a pattern showcase, not a default.

### 6.11 Removal contracts

Two distinct removal claims (SC6):

- **Remove the whole demo (SC-ISOLATION-1):** drop the `:demo:twitter:*` includes from `settings.gradle.kts`, delete demo config + `supabase/` + demo setup docs. Keep `:app`, `:core:*`, base `:feature:*`. `:app:assembleDevDebug` + base `check` still pass — proves the template is reusable. (Holds because no base module imports any demo module.)
- **Remove one demo feature:** delete that `:demo:twitter:feature:*:impl`, its Koin module, and its nav registration in `:demo:twitter:app`. Keep its `:api` only if other demo features still reference its route keys. The demo app still compiles — proves demo modularity (a different, narrower claim than removing the whole demo).

| Backup rules | `dataExtractionRules` / `fullBackupContent` exclude auth/session token-blob files, Remote Config cache, and devtools local flag overrides. User preferences such as theme, language, and dynamic color may be backed up. |
| App targets | Two: **`:app`** (base starter) and **`:demo:twitter:app`** (demo). Both apply the same convention plugins. |
| Signing | debug = shared debug key; release signing/publishing pipeline is deferred to §22 (keystore material never committed). |
| Dynamic delivery **[demo]** | `:demo:twitter:app` declares `dynamicFeatures += [":demo:twitter:feature:imagecrop:impl"]`; ships as AAB; `SplitCompat.install()` in its `Application` (§6.10). The base `:app` has no dynamic features. |

- Convention plugins (`:build-logic`): `template.android.application`, `template.android.library`, `template.android.compose`, `template.android.feature`, `template.android.koin`, `template.android.room`, `template.test`, `template.detekt`, `template.kover`. Each uses AGP 9 `ApplicationExtension`/`androidComponents` APIs (not `BaseExtension`/`applicationVariants`). Both app targets reuse them.
- **Target-split config (no demo secret blocks a base build):**
  - **Base `:app`** flavors set `DUMMYJSON_BASE_URL` (default `https://dummyjson.com`), Firebase/Measure/AdMob/Branch config fields, and `DEVTOOLS_ENABLED` via `BuildConfig`. Debug builds require local placeholder or real service values in ignored per-environment files; CI uses GitHub Environments secrets. The template may copy the same provider project values into `dev`/`staging`/`prod` files, but the files stay separate so forks have an obvious split point.
  - **Demo `:demo:twitter:app`** flavors set `DEMO_TWITTER_SUPABASE_URL` / `…_ANON_KEY`, `DEMO_TWITTER_GOOGLE_WEB_CLIENT_ID`, `DEMO_TWITTER_MEASURE_API_KEY`, demo Firebase/AdMob/Branch values, and `DEVTOOLS_ENABLED` from separate demo config files / CI secrets (never committed). Demo service projects are separate from the base template project; placeholders ship until the projects are created.
- Product flavors (`environment` = `dev`/`staging`/`prod`) and `DEVTOOLS_ENABLED` apply within **each** app target. Prod variants must fail an architecture test if a Devtools route, `:feature:devtools:impl`, or local override binding is present.
- **SDK policy:** stable-by-default. `compileSdk`/`targetSdk` stay at **36**; Android 17/API 37 shipped stable (Jun 2026) but is adopted only as an explicit opt-in branch once the ecosystem and Play target requirements settle — not the template baseline.

## 8. Feature Requirements

IDs are traceable to tests and CI. Each feature lives behind an interface where it touches a vendor SDK. For the per-module overview see the **module catalog §6.8**. **This section specs the BASE (opinionated & complete) features** — splash, auth (username/password), account deletion, sample, settings, push transport, update/review, flags, ads, deep links, devtools, design system, adaptive, a11y. **The Twitter-lite demo features (auth via Google SSO/passkey, onboarding, feed/post/profile/search/notifications) and the demo backend are specced in §9.**

### 8.1 Splash — `:feature:splash` (base)
- **FR-SPLASH-1** Use `androidx.core:core-splashscreen` (`installSplashScreen()`); no custom splash Activity.
- **FR-SPLASH-2** `setKeepOnScreenCondition { !viewModel.isReady }` holds the splash until initial readiness (session + flags) resolves (cheap state check only; no I/O in the lambda).
- **FR-SPLASH-3** On ready, route via an **injected `SplashRouter`** so the screen is target-agnostic: **base** → auth (no session) / sample home (session); **demo** → auth / onboarding / feed (§9). *Acceptance:* cold start shows no blank/flash frame; routing matches the injected decision.

### 8.2 Auth — `:feature:auth` (base: Credential Manager username/password → DummyJSON)
The base demonstrates the most common real-world auth: a token-based REST login against a public sample backend. (Demo replaces the binding with Google SSO + passkey + Supabase, §9.)
- **FR-AUTH-1** Sign-in via **Credential Manager password flow**: `GetCredentialRequest` with `GetPasswordOption` retrieves a saved username/password (Google Password Manager autofill); first-time users enter credentials and the app offers `CreatePasswordRequest` to save them. No legacy APIs.
- **FR-AUTH-2** Credentials POST to **DummyJSON** `/auth/login` → `{accessToken, refreshToken}` (JWT). Demo seed credentials documented (e.g. `emilys` / `emilyspass`).
- **FR-AUTH-3** **Token lifecycle:** tokens persist through `TokenStore`; production binding encrypts with Android Keystore before persistence (DataStore/private storage may hold encrypted bytes only, never plaintext tokens). Auth/session token blobs are excluded from Android Auto Backup/restore via `dataExtractionRules` / `fullBackupContent`; if decrypt fails after restore/key invalidation, clear `TokenStore` and route to sign-in. A Ktor/OkHttp **Bearer interceptor** attaches the access token; on 401 a **silent refresh** via `/auth/refresh` retries once, else routes to sign-in; `/auth/me` bootstraps the session on cold start. All behind the base `AuthRepository`/`SessionProvider` interface.
- **FR-AUTH-4** Sign-out clears `TokenStore`, Credential Manager provider/session state (`clearCredentialState()`), auth-scoped Room caches + paging keys, and routes to auth. User-neutral settings (theme/language) remain. `clearCredentialState()` does **not** delete saved passwords from Google Password Manager; saved credentials remain user-managed outside the app.
- **FR-AUTH-5** **Bindings swap, UI doesn't:** `:feature:auth` exposes `AuthKey` + the `AuthRepository` contract; the base binding is DummyJSON, the demo binds Supabase (the demo also swaps the *screen* for its Google/passkey UI in `:demo:twitter:feature:auth`). *Acceptance:* fresh install with base service config present → Credential Manager password sign-in → token stored → sample home; relaunch resumes the session; 401 triggers refresh; logout clears auth state and auth-scoped caches.
- **Config:** `DUMMYJSON_BASE_URL` (default `https://dummyjson.com`); no secrets. CI/tests use Ktor `MockEngine`.

### 8.3 Push transport — `:core:push` (base, generic)
Generic FCM client transport. The **token-sync destination is injected** (base: a no-op/DummyJSON sink; demo: Supabase `push_tokens`), and the **server-side send** is demo-only (§9). A tapped push routes via `DeepLinkResolver`; in the demo it opens the Notifications screen or the referenced post/profile.
- **FR-PUSH-1** `FirebaseMessagingService` overrides `onMessageReceived` (foreground + data) and `onNewToken`. Token registration / topic subscribe are exposed via a **`PushMessagingRegistrar`** facade (the Service is OS-instantiated, stays concrete in `:core:push`). `onNewToken` enqueues a **`TokenSyncWorker`** (`CoroutineWorker`, network constraint + exponential backoff) that registers the token via an **injected `TokenSink`** — resilient to offline / process death. (Base default = no-op/local; demo binds Supabase upsert.)
- **FR-PUSH-2** Notification channels created in `Application.onCreate()` (before any message can arrive); `default_notification_channel_id` meta-data set.
- **FR-PUSH-3** `POST_NOTIFICATIONS` requested contextually, not at cold start; handle permanent denial → Settings deep-link. *Acceptance:* test push renders in foreground and background; token visible in devtools.
- **FR-PUSH-4 [demo]** **Token lifecycle + security (Supabase binding):** `TokenSink` upserts the FCM token into `push_tokens` (owner-only RLS, `user_id = auth.uid()`). On sign-out/delete, the demo attempts to delete this device's token row before clearing session; if offline, it enqueues a best-effort cleanup keyed by prior user id + token. Stale tokens are pruned by a **`pg_cron`** job as demo backend design guidance, not as a mobile CI-owned test. Clients upsert/delete **only their own** token, cannot list others', cannot self-subscribe to privileged topics. FCM client tokens are not stored through `TokenStore`; if cached locally, normal app-private/DataStore persistence is acceptable, while logs/telemetry must redact them (SR-10). FCM **server credentials never ship in app code**. (Specced in §9; base ships only the generic transport/no-op or local sink.)
- **FR-PUSH-5 [demo]** **Server-side push send via a Supabase Edge Function** (`supabase/functions/send-push`, Deno/TS): a **Database Webhook** on `notifications` insert invokes it; FCM push **only for `type in ('comment','follow')`** — likes stay in-app. FCM HTTP v1 authenticated by a **Firebase service-account secret held Supabase-side** (`supabase secrets set` — never in app, never the Supabase `service_role` in app). Detailed in §9. Devtools can fire a manual test push (both targets).

### 8.4 Settings — `:feature:settings`
- **FR-SET-1** Theme: system / light / dark, persisted in DataStore (`Flow<ThemeMode>`), applied at root.
- **FR-SET-2** **Dynamic color (Material You) toggle** in Settings, API 31+ (hidden/no-op below 31), persisted in DataStore. **Default OFF (brand-first).** `AppTheme` selects the `ColorScheme` at the root: `dynamicLight/DarkColorScheme(context)` when on + API≥31, else `EmberLight/DarkColorScheme` (FR-DS-1) — a one-line `when`, no call-site changes. Enabling it **deliberately overrides the Ember palette** with wallpaper-derived M3 roles (documented tradeoff: personalization vs brand); Ember typography/shape/spacing + extended semantic colors stay fixed. Toggling reswaps instantly via recomposition (no restart).
- **FR-SET-3** Language picker via `setApplicationLocales` (BCP-47, API 33+; hidden/no-op below 33).
- **FR-SET-4** Logout (→ FR-AUTH-4). Entry points for force/in-app update status, "rate app", and **delete account** (→ `:feature:account`, §8.15).

### 8.5 Force update + In-app update — `:core:playservices` (`AppUpdateCoordinator`)
Play Core's `AppUpdateManager` (final classes, listener-based, lifecycle-bound) is wrapped behind an **`AppUpdateCoordinator`** facade that owns the policy and is unit-testable with a fake.
- **FR-UPD-1** Two-signal: effective flag value for `min_required_version` (Remote Config cache plus dev/staging local override, non-dismissible gate + immediate update / Play deep-link if `versionCode < min`) **and** Play in-app-update (`updatePriority ≥ 4` → immediate; else flexible).
- **FR-UPD-2** Flexible update shows a completion snackbar on `DOWNLOADED` → `completeUpdate()`.
- **FR-UPD-3** Re-attach stalled immediate updates in `onResume`. *Acceptance:* devtools local override of `min_required_version` can force the update gate locally without changing shared Firebase Remote Config; simulated low `min_required_version` blocks the app; flexible flow completes and restarts.

### 8.6 In-app review — `:core:playservices` (`ReviewPrompter`)
- **FR-REV-1** A **`ReviewPrompter`** facade wraps `ReviewManager.requestReviewFlow()` + `launchReviewFlow()`, triggered after a meaningful action (e.g., posting). Feature modules ask for a review *opportunity* without depending on Play Core or its silent-quota behavior. **Not** wired to a button. Fake impl in tests.

### 8.7 Feature flags — `:core:datastore` + `:core:data`
- **FR-FLAG-1** Firebase Remote Config is the source of truth; values are normalized into typed flag definitions and cached to Proto DataStore. Feature code consumes only `FeatureFlagProvider` typed `Flow`s — never Firebase APIs or raw string keys.
- **FR-FLAG-2** Fetch+activate on launch (12h throttle in prod, 0 in dev); real-time listener for kill-switches writes through to DataStore. *Acceptance:* toggling a flag in Firebase console flips UI within the configured path; offline launch uses cached values.
- **FR-FLAG-3** Local override architecture: `FeatureFlagProvider` resolves `effective = localOverride ?: remoteCache ?: default`, where `localOverride` is a DataStore-backed devtools-only layer available in `dev`/`staging` builds. Overrides are typed, listable, resettable, visibly marked in Devtools, excluded from Android Auto Backup/restore, and never mutate the Remote Config cache. Overrides apply to normal flags and safety gates such as `min_required_version` so developers can test force-update behavior without changing a shared Firebase environment. Prod builds do not include the override UI and enforce `LOCAL_FLAG_OVERRIDES_ENABLED=false`; a startup guard fails fast in non-debuggable prod if overrides are enabled. Tests can inject an in-memory override source.

### 8.8 Ads — `:ads` (base, configured service)
- **FR-ADS-1** `AdManager` contract lives in `:core:ads`; AdMob impl in `:ads` is included by default; `NoOpAdManager` is reserved for tests or forks that intentionally remove ads. Feature/app code depends on `:core:ads`, not the AdMob/UMP implementation.
- **FR-ADS-2** UMP consent is wrapped behind a **`ConsentManager`** contract in `:core:ads`; UMP implementation lives in `:ads` and must resolve before `MobileAds.initialize()`. Test ad unit IDs via `BuildConfig`; "Privacy options" entry in settings depends on the contract, not the UMP SDK. *Acceptance:* with required AdMob config present, a test banner loads after consent; tests/forks can bind `NoOpAdManager` + fake consent.

### 8.9 Deep linking — `:core:deeplink` + `:deeplink-branch` (base, configured service)
- **FR-DEEP-1** Native App Links (`autoVerify`, `assetlinks.json`) route through the `:core:deeplink` `DeepLinkResolver` contract into Nav3.
- **FR-DEEP-2** Branch.io impl lives in `:deeplink-branch` for deferred deep linking; it is included by default but remains outside contract core behind `:core:deeplink`. (No Firebase Dynamic Links — discontinued.) *Acceptance:* a verified `https://<domain>/<route>` link opens the matching screen in-app (base: a sample detail; demo: a post/profile), and Branch deferred links resolve through the same route contract when configured.

### 8.10 Devtools — `:feature:devtools` (dev/staging only)
- **FR-DEV-1** Copy FCM token, show env/flavor/build info, override feature flags locally, trigger test crash/notification. Wired only when `DEVTOOLS_ENABLED=true`; `:feature:devtools:impl`, its Koin module, Devtools route, Showkase entry, and local override bindings are excluded from `prod` runtime graph. Architecture tests enforce absence in prod.

### 8.11 Design system & component catalog — `:core:designsystem` (+ optional `:app-catalog`)
- **FR-DS-1** Custom font family, semantic color tokens (light/dark), typography + shape scales, spacing tokens. **Color is authored as full Material 3 `ColorScheme` role sets** (`EmberLight/DarkColorScheme` — every role, generated from a brand seed) so brand and dynamic color share one contract; brand-specific colors with no M3 role (like-heart, verified, brand gradient) live in a **`LocalEmberExtendedColors` `CompositionLocal`**. **Components read `MaterialTheme.colorScheme` roles + extended-color locals only — never raw hex.** Typography/shape/spacing are always Ember (Material You themes color only). NiA `Theme.kt` is the reference.
- **FR-DS-2** **Wrapped atoms** — thin `App*` composables over M3 (`AppButton` w/ filled/tonal/outlined/text/destructive variants, `AppTextField`, `AppCard`, `AppAvatar`, `AppChip`, `AppTopBar`, `AppNavigationBar`, `AppDialog`, `AppBottomSheet`, `AppScaffold`, loading/empty/error state composables). Rationale: a single seam to inject Ember tokens + cross-cutting behavior (a11y defaults like 48dp touch targets/semantics, analytics `onClick` hooks, perf marks) without touching call sites. Wrappers stay thin — M3 component + tokens + hooks, not a re-export of the full M3 API. Apps never use raw M3 components directly.
- **FR-DS-3** Each atom has `@Preview`s across light/dark + font scales (multipreview annotations `@PreviewLightDark`, `@PreviewFontScales`), and complex states are driven by `@PreviewParameter` providers (the idiomatic Compose answer to mocking loading/error/empty/populated).
- **FR-DS-4** Design-system atoms and catalog previews covered by **Roborazzi** screenshot tests **auto-generated from `@Preview`s via ComposablePreviewScanner** (one assertion per preview); Compose Preview Screenshot Testing kept as secondary (still alpha). Full app-screen screenshot coverage is deferred; app screens use targeted Compose UI/adaptive tests with fakes.
- **FR-DS-5** **In-app component catalog (default):** Showkase wired in the **debug** build only (KSP, not KAPT), auto-discovering all `@Preview` composables into a browsable in-app gallery; entry point exposed via `:feature:devtools`. Designers/PMs can browse by running the debug APK.
- **FR-DS-6** **Standalone catalog (optional, off):** an `:app-catalog` application module skeleton (NiA-style separate APK depending on `:core:designsystem` + `:core:ui`), shipped with a README explaining when to activate it (design-system / multi-team scale). Not wired into the default build or default CI.
- **Known limitation:** no production-ready Storybook-style **interactive knobs** panel exists for Compose in 2026 (Android Studio Interactive Preview allows interaction but not prop toggling; Storytale is pre-release). Documented as a gap; the `@PreviewParameter` + multipreview matrix is the accepted substitute.

### 8.12 Adaptive UI — `:core:ui` + each app target (P0)
- **FR-ADPT-1** App scaffold uses **`NavigationSuiteScaffold`** driven by `currentWindowAdaptiveInfo()`: bottom nav bar on **compact**, navigation rail/drawer on **medium/expanded**. Top-level destinations render correctly at every width (base: sample/settings; demo: the 4 social tabs).
- **FR-ADPT-2** Layouts respond to **window size classes** (compact/medium/expanded) — content max-width / multi-column where it helps; no stretched single-column on tablets. One **list-detail showcase** via `ListDetailPaneScaffold` on expanded width is the canonical adaptive example — **base: sample list → detail; demo: feed → post detail.**
- **FR-ADPT-3** **Edge-to-edge** by default; all screens consume insets (`windowInsetsPadding`/`safeDrawing`) — no content under status/nav bars. **Predictive back:** opt into the new back-dispatch API via `android:enableOnBackInvokedCallback` (required regardless — legacy `onBackPressed` is deprecated) and wire Nav3 predictive transitions. **Coverage:** the predictive *animation* renders on **API 34+**, is dev-option-gated on API 33, and degrades to standard back on API 28–32 (no preview) — graceful everywhere.
- **FR-ADPT-4** State survives configuration change / resize / fold posture (rememberSaveable + ViewModel). *Acceptance:* the list-detail showcase works as bottom-bar (phone) and rail + two-pane (tablet/expanded); rotating and folding preserves scroll/selection.

### 8.13 Accessibility — cross-cutting (P0)
- **FR-A11Y-1** **Semantics baseline** (enforced in `:core:designsystem`/`:core:ui` wrappers): every `Icon`/`Image` has a `contentDescription` (or explicit `null` if decorative); compound rows use `mergeDescendants`; section titles use `heading()`; toggles expose `stateDescription`; dynamic regions use `liveRegion`; non-obvious gestures expose `customActions`.
- **FR-A11Y-2** **Touch targets ≥ 48dp** — Material 3 atoms inherit this; custom clickables set `Modifier.minimumInteractiveComponentSize()`/`sizeIn(48.dp)`.
- **FR-A11Y-3** **Automated checks in CI:** (a) targeted Compose UI tests call `enableAccessibilityChecks()` (`androidx.compose.ui:ui-test-junit4-accessibility`, ATF-backed); (b) design-system Roborazzi screenshot tests add **`roborazzi-accessibility-check`** (JVM/ATF — missing-label + contrast + touch-target) at failure level Error; (c) Android **Lint a11y rules** (`ContentDescription`, `LabelFor`, `ClickableViewAccessibility`) promoted to `error` in `lint.xml` (covers any residual View surfaces; Compose covered by a/b).
- **FR-A11Y-4** Large **font-scale** resilience: design-system previews tested at 1.0× and ~2.0× via `@PreviewFontScales` + screenshot tests; key app screens covered by targeted Compose/adaptive tests. No clipped/overlapping text. Color roles meet WCAG AA (already true for Ember tokens).
- **Manual (documented in `docs/accessibility.md`, not CI-gated):** TalkBack pass on critical flows, Accessibility Scanner audit, Google Play pre-launch report. Reference patterns: CVS Health *android-compose-accessibility-techniques*. *Acceptance:* a11y test suite + lint gate pass in CI; documented manual checklist exists.

### 8.14 Tool-backed adaptive & accessibility gates
- The CI-enforced a11y mechanism (Lint a11y rules→error, `enableAccessibilityChecks`, `roborazzi-accessibility-check`) and the manual checklist are specced in §8.13 (FR-A11Y-3 / Manual). This section adds two tool-backed gates beyond §8.13:
- **FR-A11Y-GATE-1** Compose static hygiene linting via a maintained pack (preferably `slackhq/compose-lints`) enforces Compose API/testability conventions. Supports, does not replace, accessibility tests.
- **FR-A11Y-GATE-2** Project-specific architecture rules enforce use of design-system wrappers for production screens where practical, so shared semantics + 48dp touch-target defaults are not bypassed (enforcement of FR-DS-2).

### 8.15 Account deletion — `:feature:account` (base)
Generic, Play-required account-removal flow behind the `AuthRepository`/`SessionProvider` abstraction.
- **FR-ACCT-1** Settings → "Delete account" → a confirmation screen (`AccountKey`) requiring explicit confirm; explains consequences.
- **FR-ACCT-2** On confirm, calls `AuthRepository.deleteAccount()` then clears `TokenStore`, Credential Manager provider/session state (`clearCredentialState()`), auth-scoped Room caches + paging keys, and routes to auth. User-neutral settings (theme/language) remain. Saved passwords in Google Password Manager are not deleted by this flow; the user manages them externally. Base binding calls DummyJSON `DELETE /users/{id}` and treats a response with `isDeleted=true` + `deletedOn` as success. DummyJSON does not persist deletion server-side; adopters must replace the binding with real backend deletion before shipping. The demo binds real deletion (Supabase `security definer` RPC / Edge Function, §9).
- **FR-ACCT-3** Errors are non-destructive: failure keeps the session and surfaces a retry. *Acceptance:* confirm → session, Credential Manager provider/session state, auth-scoped caches, and paging keys cleared → auth screen; saved password remains user-managed; cancel is a no-op.

### 8.16 Sample feature — `:feature:sample` (base)
The neutral vertical slice proving the full app architecture without a first-party backend. A generic content browser over **DummyJSON** `/posts` + `/users`; the intended replace-or-delete starting point for a team's first real feature.
- **FR-SAMPLE-1** **List** (`SampleListKey`): paged content list via **Paging 3 + RemoteMediator**, **Room as SSOT** (offline-survivable), pull-to-refresh. DummyJSON is **offset-paged** (`limit`/`skip`) — demonstrates a `RemoteMediator` over an offset API (contrast with the demo's keyset path, §9).
- **FR-SAMPLE-2** **Detail** (`SampleDetailKey`): item header + body; an associated user row → a generic profile-ish detail. Hero `SharedTransitionLayout` from the list (mirrors the demo pattern, neutrally).
- **FR-SAMPLE-3** **Search:** debounced query over `/posts/search` (+ `/users/search`); empty/no-result states.
- **FR-SAMPLE-4** Writes are **simulated** server-side (DummyJSON) → any create/edit is local-only and labelled; the sample is read-focused. All HTTP behind a generic `SampleRepository`; CI/tests use Ktor `MockEngine`. **Design:** `docs/design/sample.md` _(TBD)_.

*(Onboarding / profile completion is a **demo** feature — Google SSO yields no unique handle — and is specced in §9.)*

## 9. Twitter-lite Demo App & Backend (Supabase)

The **`:demo:twitter:app`** target — a small but complete social app exercising every layer: auth → paged network+DB feed → realtime → post detail + comments → likes → follows → search → profile view/edit → multi-image upload. It **reuses base modules** (`:core:*`, `:feature:splash`/`:settings`/`:devtools`/`:account`, observability/push/playservices/ads/deeplink) and **adds** Supabase + the social domain in `:demo:twitter:*`. All modules named below without a `:core:`/base prefix are `:demo:twitter:*`. Comments are **in scope** (one flat thread per post). Out of scope as extension exercises: notification types beyond like/follow/comment, DMs, retweets/quotes, bookmarks, hashtags/mentions, video.

### Demo authentication (`:demo:twitter:feature:auth`)
The demo swaps the base auth screen + binding for the **federated** pattern (Supabase is the backend/RP).
- **FR-DAUTH-1** Google SSO via **Credential Manager** (`GetGoogleIdOption` silent re-auth → `GetSignInWithGoogleOption` button fallback). No legacy `play-services-auth`.
- **FR-DAUTH-2** Exchange the Google ID token with Supabase via `compose-auth` → `signInWithIdToken`; session persistence uses the same `TokenStore` security contract when app-owned, or a supabase-kt session storage adapter that encrypts before persistence. Binds the base `AuthRepository`/`SessionProvider` contract to Supabase.
- **FR-DAUTH-3** **Replay protection via an asymmetric nonce flow** (the Supabase+Google gotcha): generate one raw random nonce; pass its **SHA-256 hash** to Google (`setNonce(hashedNonce)`); pass the **raw** nonce to Supabase (`signInWithIdToken(nonce = rawNonce)`). Passing the same value to both makes the hashes mismatch and Supabase rejects the token — documented inline.
- **FR-DAUTH-4** Sign-out clears the Supabase session + Credential Manager provider/session state (`clearCredentialState()`), but does not delete saved Google/password/passkey credentials from the user's credential provider. Account deletion (base `:feature:account`) binds to a Supabase `security definer` RPC / Edge Function here.
- **FR-DAUTH-5 (P1, §22)** Passkeys — Supabase Auth is the WebAuthn RP (beta); `supabase-kt` passkey API pending [PR #1327](https://github.com/supabase-community/supabase-kt/pull/1327). Flag-gated default OFF; optional post-onboarding "Add a passkey?" prompt + Settings manage; routes through the same gate; cancel/unsupported → Google SSO fallback.
- **Config:** Web + Android OAuth client IDs; Supabase Google provider configured with the Web client ID.

### Demo onboarding / profile completion (`:demo:twitter:feature:onboarding`)
Google SSO issues a Supabase session but **not** a unique app handle, so a blocking profile-completion gate runs after first sign-in. The public `profiles` row is created **only on completion** (there is **no** `handle_new_user()` auto-seed) — "a `profiles` row exists for `auth.uid()`" is the completion signal.
- **FR-ONB-1** After SSO with no completed profile, route to **`ProfileSetupKey`** (outside the tab scaffold). Collects a **unique username** (required) + **display name** (required, prefilled from the Google account name). Avatar is deferred to Edit Profile (§9.1).
- **FR-ONB-2** **Username validation** — local first (`^[a-z0-9_]{3,30}$`, lowercased), a debounced availability check (`username_available` read), then atomic server enforcement via **`complete_profile(p_username, p_display_name)`** RPC (`security definer`, `set search_path = public`; derives `id = auth.uid()`, normalizes lowercase, rejects a reserved-name list, handles the unique collision atomically, callable once). Duplicate → field-level error; network error → retry.
- **FR-ONB-3** **Social actions are blocked until completion** — feed/post/comment/like/follow/search/upload routes are unreachable while no completed `profiles` row exists.
- **FR-ONB-4** **Back-stack rules:** back from onboarding does **not** reveal the app — it offers sign-out (clears Supabase session + Credential Manager provider/session state via `clearCredentialState()`, not user-managed saved credentials). Successful completion clears auth + onboarding from the back stack and routes to feed.
- **FR-ONB-5 (P1, §22)** Optional post-completion **"Add a passkey?"** prompt (passkey flag ON only; default OFF). Username is immutable after onboarding in v1 (Edit Profile changes display name/bio/avatar only, §17); reserved-username list is **SQL-authoritative**, mirrored in app. **Design:** `docs/design/onboarding.md` _(TBD)_.

### 9.1 Screen inventory

Each screen names its Nav3 route key, owning module, the core UI, and its data source. Visual design (layout, components) is delegated to Claude design against the Ember design system (`compose-theme/` → `:core:designsystem`); this table defines *what each screen does*, not how it looks.

| # | Screen | Nav3 key | Module | Purpose / interactions | Data source |
|---|---|---|---|---|---|
| 1 | Splash | `SplashKey` | `:feature:splash` (base) | Brand hold until session + remote-config resolve, then route to feed / onboarding / sign-in (injected demo router). | session / Remote Config |

### 9.2 Navigation map (Nav3)

Bottom navigation = 4 tabs, each with its own back stack (Nav3 multiple-back-stack recipe; switching tabs preserves each stack):

- **Home** → `FeedKey` → `PostDetailKey` → `ProfileKey` → (`UserListKey`, `PostDetailKey`, …)
- **Search** → `SearchKey` → `ProfileKey` / `PostDetailKey`
- **Notifications** → `NotificationsKey` → `PostDetailKey` / `ProfileKey`
- **Profile (me)** → `ProfileKey(me)` → `EditProfileKey` / `UserListKey`

Top-level entries above the tab scaffold: `SplashKey`, `AuthKey`, **`ProfileSetupKey`** (first-run profile-completion gate — blocks the tab scaffold until a `profiles` row exists; back = sign-out, §9 Demo onboarding), `SettingsKey`, and `ComposePostKey` (modal, launched from the Home FAB). The reply composer is inline on Post detail, not a separate route. `:api` modules expose only their keys + entry contracts; cross-feature navigation (feed → post → profile → search) goes through `:api`, never `:impl`.

### 9.3 Schema (Postgres / Supabase)

```sql
create table public.profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  username text not null unique check (username ~ '^[a-z0-9_]{3,30}$'),
  display_name text not null check (char_length(display_name) between 1 and 80),
  avatar_url text,
  bio text not null default '' check (char_length(bio) <= 160),
  created_at timestamptz not null default now()
);
-- Row is created only at onboarding completion via complete_profile() — there is NO
-- handle_new_user() auto-seed. "A profiles row exists for auth.uid()" IS the
-- profile-completion signal (§9, Demo onboarding). Username is immutable in v1.
create table public.posts (
  id bigint generated always as identity primary key,
  author_id uuid not null references public.profiles(id) on delete cascade,
  body text not null check (char_length(body) between 1 and 280),
  image_urls text[] not null default '{}'
    check (coalesce(array_length(image_urls, 1), 0) <= 4),
  created_at timestamptz not null default now()
);
create index posts_author_created_idx on public.posts(author_id, created_at desc);
create index posts_created_idx on public.posts(created_at desc);
create table public.comments (
  id bigint generated always as identity primary key,
  post_id bigint not null references public.posts(id) on delete cascade,
  author_id uuid not null references public.profiles(id) on delete cascade,
  body text not null check (char_length(body) between 1 and 280),
  created_at timestamptz not null default now()
);
create index comments_post_created_idx on public.comments(post_id, created_at);
create table public.follows (
  follower_id uuid not null references public.profiles(id) on delete cascade,
  followee_id uuid not null references public.profiles(id) on delete cascade,
  created_at timestamptz not null default now(),
  primary key (follower_id, followee_id),
  constraint no_self_follow check (follower_id <> followee_id)
);
create table public.likes (
  post_id bigint not null references public.posts(id) on delete cascade,
  user_id uuid not null references public.profiles(id) on delete cascade,
  created_at timestamptz not null default now(),
  primary key (post_id, user_id)
);
create table public.notifications (
  id bigint generated always as identity primary key,
  recipient_id uuid not null references public.profiles(id) on delete cascade,
  actor_id uuid not null references public.profiles(id) on delete cascade,
  type text not null check (type in ('like', 'follow', 'comment')),
  post_id bigint references public.posts(id) on delete cascade,
  comment_id bigint references public.comments(id) on delete cascade,
  read_at timestamptz,
  created_at timestamptz not null default now(),
  constraint no_self_notify check (recipient_id <> actor_id)
);
create index notifications_recipient_idx on public.notifications(recipient_id, created_at desc);
create table public.push_tokens (
  id uuid primary key default gen_random_uuid(),
  user_id uuid not null references auth.users(id) on delete cascade,
  token text not null unique,
  platform text not null default 'android' check (platform = 'android'),
  app_version text,
  device_label text,
  created_at timestamptz not null default now(),
  last_seen_at timestamptz not null default now()
);
create index push_tokens_user_idx on public.push_tokens(user_id);
```

### 9.4 RLS + triggers + feed
- **Read posture = authenticated-only** (not public/anon). RLS on every exposed table; grants go to `authenticated`, **not `anon`** — the app gates all social reads behind auth, so anon API reads would be an inconsistency, not a feature. Per table: **`profiles`** authenticated `select`, owner `update`, no client `delete`; **`posts`/`comments`** authenticated `select`, author `insert`/`update`/`delete` (`author_id = auth.uid()`, both `using` + `with check`); **`likes`** authenticated `select`, user `insert`/`delete` own; **`follows`** authenticated `select`, follower `insert`/`delete` own; **`notifications`** recipient `select` only — **no client content writes** (mark-read RPC below); **`push_tokens`** owner-only all ops (`user_id = auth.uid()`), no cross-user reads. Profiles/posts are visible to **any authenticated user** (public-square model — search/view-any/follow), not followers-only.
- Notifications populated by triggers on `likes`/`follows`/`comments` insert → one `notifications` row to the affected content owner (`security definer`, `no_self_notify` skips self-actions); delete cascades clean them up. **Clients never mutate notification content** — mark-read goes through `mark_notification_read(p_id)` / `mark_all_notifications_read()` RPCs (`security definer`, verify `recipient_id = auth.uid()`, update only `read_at`). Realtime channel on `notifications` filtered by `recipient_id` drives the unread badge. A **Database Webhook** on `notifications` insert fires the `send-push` Edge Function (FR-PUSH-5), which delivers FCM pushes for `type in ('comment','follow')` only (likes stay in-app).
- **Profile completion (no auto-seed):** there is **no** `handle_new_user()` trigger — Google SSO creates only the `auth.users` row + session. The public `profiles` row is created at onboarding (§9, Demo onboarding) via **`complete_profile(p_username, p_display_name)`** (`security definer`, `set search_path = public`): derives `id = auth.uid()`, lowercases + format-checks the username (`^[a-z0-9_]{3,30}$`), rejects a **reserved-name** list (SQL-authoritative), inserts atomically (unique violation → typed "username taken" error), and is callable once (errors if a row already exists). `profiles` has **no client `insert` policy** — creation is RPC-only. A `username_available(p_username)` read backs the debounced availability check.
- **`security definer` hardening (every definer fn/trigger):** fixed `set search_path = public`, least-privileged owner, explicit grants to required roles only, no dynamic SQL unless justified, never trusts caller-provided owner IDs (always derives from `auth.uid()`), validates inputs before writes, and carries a comment explaining why definer is needed. This is backend design guidance, not a mobile CI requirement.
- Home feed = **`get_home_feed(p_limit, p_cursor_created timestamptz, p_cursor_id bigint)` RPC** (`security definer`, `set search_path = public`): posts from followed authors + self, ordered `created_at desc, id desc`, with `like_count`, `comment_count`, and `liked_by_me`. **Keyset (cursor) pagination, not offset** — `where (p_cursor_created is null or (created_at, id) < (p_cursor_created, p_cursor_id))`; the `id` tiebreaker keeps the boundary stable so head inserts + realtime prepend never duplicate/skip rows. Called via `postgrest.rpc(...)`; the last row's `(created_at, id)` is the Paging 3 `RemoteMediator` remote key into Room.
- **Realtime feed fan-out = Broadcast from Database** (not Postgres Changes): a `security definer` trigger on `posts` insert calls `realtime.broadcast_changes` to topic `feed:{follower_id}` for every follower of the author (join `follows`) — the **author is excluded** (they already have the post optimistically + via RPC, so no self-echo/duplicate). Clients subscribe to their **own** private `feed:{me}` topic and prepend. This avoids Postgres Changes' global firehose + its inability to filter `author_id ∈ {dynamic followed set}`. Private topics are gated by **Realtime Authorization** RLS on `realtime.messages`. **Notifications stay on Postgres Changes** filtered by `recipient_id = auth.uid()` (single-column filter — the right tool there). Both realtime modes are demonstrated.
- Search: `profiles` by `username`/`display_name` and `posts` by `body` via PostgREST `ilike` (`%q%`); results keyset-paged (`order + lt + limit`); upgrade path to Postgres full-text (`to_tsvector`) noted in migration comments.
- Profile tabs: own posts via `posts` by `author_id` (`created_at desc`); liked posts via `likes` filtered by `user_id` joined to `posts` (PostgREST embedded resource), newest-liked first (`likes.created_at desc`). Both keyset-paged (`lt(created_at) + order + limit`, `id` tiebreaker) — not `.range()` offset.
- **Pagination policy:** every infinite list (feed, profile tabs, search, user lists, notifications) uses **keyset/seek pagination** keyed on `(created_at, id)` (or the relation's PK) — never `OFFSET` / `.range()` — for stable boundaries under inserts and O(log n) deep-page cost. "Jump to page N" is intentionally unsupported (infinite scroll only).
- **Storage — bucket `media`:** public read (uploaded demo media is public content; signed URLs are the documented hardening upgrade), **authenticated upload only**, with **path ownership** — objects live under `users/{auth.uid()}/avatars/...` and `users/{auth.uid()}/posts/{post_id}/...`; Storage RLS requires the `uid` path segment to equal `auth.uid()` (`(storage.foldername(name))[1] = auth.uid()::text`) on `insert`/`update`/`delete`, so no user can write under another's prefix. Allowed MIME `image/jpeg|png|webp`, ≤4 images/post (policy + repo validation); author deletes own post media, owner replaces/deletes own avatar; deleting a post removes/orphan-tracks its media. A post stores up to 4 object URLs in `posts.image_urls`.
- **Notification abuse prevention (comment/follow):** notification triggers for `comment` and `follow` include per-actor-per-recipient throttling and dedup to prevent push spam — a `UNIQUE` constraint on `(recipient_id, actor_id, type, post_id)` for comment notifications (one row per actor-per-post) and `ON CONFLICT DO NOTHING` for re-follows (toggling follow/unfollow does not re-fire a notification if one already exists for that actor-recipient pair within a cooldown window). Like notifications are excluded from FCM push entirely (FR-PUSH-5) and do not require throttling. This prevents a user from repeatedly follow/unfollow or comment-spamming another user into unlimited push delivery.
- **send-push Edge Function authorization:** the `send-push` Edge Function is **webhook-only** — `verify_jwt: false` (the Database Webhook is not a user session and carries no JWT) combined with **Supabase webhook signature verification** inside the function body. The function verifies the `x-supabase-signature` header against the webhook secret before processing, so only the Database Webhook can invoke it — not arbitrary HTTP callers. This prevents direct invocation with a crafted payload to trigger push delivery bypassing the trigger/RLS flow.
- **Account-deletion Storage cleanup:** the account-deletion `security definer` RPC/Edge Function deletes all Storage objects under `users/{auth.uid()}/*` (avatars + post media) **before** cascading the `auth.users` row — SQL foreign keys clean `profiles`/`posts`/`comments`/etc. but Storage objects are not Postgres rows and would otherwise persist indefinitely (GDPR/CCPA right-to-deletion gap). The function uses the Supabase Storage admin API with the `service_role` key (Supabase-side, never in app) to delete by prefix.

### 9.5 Data requirements
- **FR-DEMO-1** Feed paginates via **keyset cursor `(created_at, id)`** (Paging 3 + RemoteMediator + Room cache) — never offset, so head inserts + realtime prepend don't duplicate/skip; pull-to-refresh; new posts from followed users arrive via **Broadcast-from-Database** (client subscribes only to its own private `feed:{me}` topic) and prepend as a "N new posts" banner (no auto-jump). **Banner interaction:** tapping the banner prepends the new posts to the feed and scrolls to the top; swiping the banner dismisses it without prepending.
- **FR-DEMO-2** Post detail: header renders an **instant partial from the feed's Room cache** (`PostDetailKey` is ID-only → VM reads Room post-by-id), survives offline when entered from the feed, with a `SharedTransitionLayout` hero from the card; full post + comments (oldest→newest) are **network-only** (offline → comments show an offline state). Entered from search/profile (not feed-cached) → network load / offline error. Inline reply adds a comment optimistically; `comment_count` reflects on the feed card and detail.
- **FR-DEMO-3** Like/unlike is optimistic + idempotent (`likes` composite PK).
- **FR-DEMO-4** Follow/unfollow updates feed source + counts; followers/following lists paginate.
- **FR-DEMO-5** Compose post: body ≤280 + up to 4 images via the **Android Photo Picker** (`PickMultipleVisualMedia(maxItems=4)` — **no `READ_MEDIA_*` permission**, scoped URIs, backported via Play Services). Validation + char limit before enqueue. **Optimistic Room-only row** — temp sentinel id, `created_at = client now()` (sorts on top of the keyset feed), local-only **`syncState = pending`** column (not in Postgres). A **`PostImageUploadWorker`** (`CoroutineWorker`: network constraint + exponential backoff + `setForeground` progress) uploads images to the user's owner-path in Storage (MIME/size per §9.4), inserts the `posts` row with **`return=representation`**, and **reconciles** the Room row by its temp key — swapping in the authoritative `(id, created_at)` and `syncState = sent`. Permanent failure → `syncState = failed` + **retry**. Survives process death. No duplicate vs realtime because the feed broadcast **excludes the author** (§9.4).
- **FR-DEMO-6** Search: debounced query over People (`profiles`) and Posts (`posts`); results navigate to profile / post detail.
- **FR-DEMO-7** Profile: view any user — header + a **Posts / Likes** tab row (own posts by `author_id`; liked posts via `likes` joined to `posts`), both paged; self can edit display name, bio, avatar (username immutable in v1).
- **FR-DEMO-8** Onboarding gate: first-run users (session but no `profiles` row) complete a unique username + display name via `complete_profile` before any social route is reachable; returning completed users skip it (§9, Demo onboarding).
- **FR-DEMO-9** Notifications: in-app activity feed (likes/follows/comments on the user's content), paged + realtime; unread badge on the Notifications tab; mark-read on view (`read_at`); rows deep-link to the post/profile. Types limited to like/follow/comment in v1 (mentions/reposts deferred with those features). Push (`:core:push`) tapping opens this screen.
- **FR-DEMO-10** **Empty-feed state for new users:** a user who just completed onboarding follows nobody, so their home feed is empty — the first screen after profile setup shows an empty state with a **"Discover people to follow"** CTA linking to Search (People segment). The Search pre-query state (FR-DEMO-13) surfaces suggested people so the CTA leads to a useful discovery surface, not a blank search field.
- **FR-DEMO-11** **Optimistic-action failure recovery (cross-cutting):** when an optimistic social action (like, follow, comment) fails on the network call, the UI **rolls back to its prior state** and surfaces a snackbar with a **"Retry"** action via the §6.3 `userMessage` pattern (`UiState.userMessage` consumed in `LaunchedEffect` then cleared). This applies consistently to like/unlike, follow/unfollow, and inline reply.
- **FR-DEMO-12** **Compose/reply discard confirmation:** when the user navigates back from `ComposePostKey` with non-empty text or attached images, show a confirmation dialog ("Discard post?") before clearing. The same pattern applies to the inline reply composer on Post detail.
- **FR-DEMO-13** **Search pre-query state:** the Search screen's initial state (before any query is typed) shows a **suggested-people** view — a paged list of profiles (e.g. recent users or a `suggested_profiles` RPC) with follow buttons — distinct from the post-query empty/no-result states (FR-DEMO-6).
- **FR-DEMO-14** **Empty-state content for Notifications and Profile:** Notifications screen shows "No notifications yet — start posting to get reactions" (no CTA needed). Profile Posts/Likes tabs show "No posts yet" / "No likes yet" respectively; the self-profile Posts tab empty state includes a **"Compose your first post"** CTA linking to `ComposePostKey`.

- **TR-2** Network-dependent screen tests must add a `network_security_config` permitting localhost cleartext.
- **TR-3** Cleartext is dev/test only; release blocks cleartext.
- **TR-4** Third-party service config strategy: committed `.template` files contain syntactically valid test values; developers copy each to its ignored non-template filename (the `cp .env.example .env` convention) for local/CI compile smoke. Unit, screenshot, Robolectric, and normal E2E tests inject fake/no-op Firebase/Measure/AdMob/UMP/Branch/Supabase bindings and must not fail because a provider backend is unavailable. Real dashboard verification is an explicit opt-in provider-smoke job using real secrets, not part of default PR gating.
