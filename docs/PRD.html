## 13. CI (GitHub Actions)

Workflows + repo automation; secrets via GitHub Environments; secret-dependent steps guarded so fork PRs don't fail. Caching via `gradle/actions/setup-gradle@v4` (not setup-java cache). All third-party actions **pinned** (tag or SHA). Every workflow sets `concurrency: { group: ${{ github.workflow }}-${{ github.ref }}, cancel-in-progress: true }` to kill superseded runs and save runner minutes.

**Scope:** v1 CI owns quality gates only. Release CI, signed AAB production, Fastlane, Play Store upload, Firebase App Distribution, release-please, release tags, release mapping uploads, and release-time real-service demo smoke are deferred to §22.

**CI profiles** (the split mirrors the two targets):
- **`base`** — *always required, configured-service profile.* Builds + tests `:app` (DummyJSON via Ktor `MockEngine` plus Firebase/Measure/Ads/Branch config from CI secrets or non-secret test placeholders), static analysis, design-system Roborazzi/a11y, targeted adaptive UI tests, Kover, **architecture/isolation tests** (SC-ISOLATION-2), and the **whole-demo-removal build** (SC-ISOLATION-1). Passes on forks after required local/CI service config is supplied.
- **`demo-compile`** — *always required.* Compiles + unit-tests `:demo:twitter:*` (Supabase calls via `MockEngine`) so demo source stays healthy without live services.

**`pr-check.yml`** (PRs) — `base` + `demo-compile` always:
- *(base + demo-compile)* `gradle/actions/wrapper-validation@v4` (verify `gradle-wrapper.jar` checksum) → `staticCheck` (incl. Lint a11y gates) + **architecture/isolation tests** → `testDebugUnitTest` (base + demo, `MockEngine`) + design-system Roborazzi a11y + targeted adaptive UI tests (compact/medium/expanded) + `koverXmlReport` → Codecov → `verifyRoborazziDevDebug` for design-system previews (upload diffs on failure) → **demo-removal build** (`:app` builds with `:demo:twitter:*` excluded).
- **PR hygiene:** `amannn/action-semantic-pull-request@v5` (Conventional-Commits PR title), `actions/labeler@v5` (path-based labels) + `CodelyTV/pr-size-labeler@v1` (XS-XL by size), `actions/dependency-review-action@v4` (block PRs adding CVE deps; public-repo free).
- **Inline feedback:** `reviewdog/action-detekt` + Android Lint via reviewdog (detekt/lint violations as inline diff comments — note: template uses **ktfmt not ktlint**, so reviewdog wraps detekt + Lint), `dorny/test-reporter@v1` (failing unit tests surfaced on the diff).
- **SAST:** `semgrep/semgrep-action@v1` (OWASP MASTG + Kotlin rules).

**`main-ci.yml`** (push to `main`):
- instrumented tests on emulator (`reactivecircus/android-emulator-runner`, macOS) — incl. Compose `enableAccessibilityChecks()` → baseline profile generation (artifact) → `gradle/actions/dependency-submission@v4` (submit Gradle dep graph so Dependabot/Renovate + dependency-review see every transitive dep in `libs.versions.toml`) → `jacobras/size-diff-action@v1` (record APK/AAB size baseline; on PRs it comments the delta).

**Code security (SAST):** `semgrep/semgrep-action@v1` in `pr-check` with OWASP MASTG + Kotlin rulesets (free on public repos; use engine + community/OWASP/own rules, not the commercially-restricted registry rules). Fills the SAST slot; complements (does not overlap) dependency CVE scanning.

**Dependency updates:** **Renovate, self-hosted as a scheduled GitHub Action** (`renovatebot/github-action`, `renovate.json`) — free, full features (no Mend subscription): groups related bumps (Compose BOM, AndroidX), **co-bumps Kotlin + KSP + compose-compiler** (one group) and **`navigation3` + `koin-compose-navigation3` (+ Koin BOM)** (another group) so neither the Kotlin toolchain nor the Nav3↔Koin-nav glue ever half-updates, and opens a dependency-dashboard issue. Also updates the pinned GitHub Actions. **Dependabot security alerts** kept passive (free, fed by `dependency-submission`) for CVE notifications; no `dependabot.yml` version-update PRs (would duplicate Renovate).

**Docs:** `dokkaGenerate` (Dokka 2.2 multi-module HTML aggregation) published to GitHub Pages on `main`.

## 15. Security & Secrets

**Scope:** SR-1/2/4/5/7/8/10 are **base** (apply to both targets). SR-3/6/9 (the Supabase backend authorization contract) are **demo-scoped** — they constrain `:demo:twitter:*`; a product app adopting Supabase inherits them, but the base starter has no first-party backend (it reads the public DummyJSON API, which holds no user secrets).
- **SR-1** No secrets, keystores, `google-services.json`, or real API keys committed. `.gitignore` + per-environment `*.template` placeholders + local `config/<target>/<environment>.properties` files generated from the templates by `scripts/create-test-credentials.sh` (bash; produces ignored placeholder config so a fresh clone builds with fake/no-op bindings — never writes real secrets). The base starter requires local service configuration to run; the same provider values may be copied across base `dev`/`staging`/`prod` files in the template, but the files remain split so forks can differentiate them immediately. Test credentials are syntactically valid placeholders for build-time parsing only; provider behavior uses fake/no-op bindings unless a provider-smoke job opts into real secrets.
- **SR-2** Release build posture: R8 minify + resource shrink; cleartext disabled; R8 mapping files generated. Mapping upload to Measure.sh + Crashlytics is deferred to the release/publishing pipeline in §22.
- **SR-3 [demo]** RLS enabled on every `public` Supabase table (deny by default; explicit policies in migrations). Extends to **Storage** (path-ownership policies on `media`) and **push_tokens** (owner-only, no cross-user read). Mobile CI does not own backend policy tests.
- **SR-4** Auth/session tokens go through `TokenStore`; production binding uses Android Keystore-backed encryption before persistence (base: DummyJSON JWTs; demo: Supabase session if app-owned). Token blobs are excluded from Android Auto Backup/restore; decrypt failure is treated as missing/invalid session and clears `TokenStore`. User preferences (theme/language/dynamic color) may be backed up; Remote Config cache and devtools local flag overrides are excluded from backup/restore. **Demo:** asymmetric auth nonce on every Google credential request (§9, FR-DAUTH-3).
- **SR-5** CI secrets live in GitHub Environments with least-privilege separation for base/demo/provider-smoke. Release environment gates are deferred to §22.
- **SR-6 [demo]** **No Supabase `service_role` key in app code** (anon key only); privileged operations stay server-side (RPCs / `security definer` functions). If a future release/app-smoke workflow seeds demo users, the `service_role` key lives only in a gated CI environment — never in any shipped artifact.
- **SR-7** **CI supply-chain:** `gradle-wrapper.jar` checksum validated (`wrapper-validation`); third-party actions pinned; `dependency-submission` + `dependency-review` surface/block CVE deps; Renovate keeps deps current; Dependabot security alerts passive.
- **SR-8** **SAST:** Semgrep OSS (`semgrep/semgrep-action`) runs on every PR with OWASP MASTG + Kotlin rules — the code-security scanner for the template.
- **SR-9 [demo]** **Backend authorization contract** (§9.4): authenticated-only reads (grants to `authenticated`, not `anon`); owner writes use `using` + `with check`; notification content is trigger-written and **client-immutable** (mark-read via RPC only); Storage objects are path-owned under `users/{auth.uid()}/...`; `push_tokens` are owner-only; every `security definer` function follows the hardening checklist (fixed `search_path`, least-priv owner, no caller-trusted IDs). This is demo backend design guidance, not a required mobile CI test suite.
- **SR-10** **Telemetry redaction (config, not custom code):** an **allowlist** posture — never log/report auth tokens, Supabase keys, Google ID tokens, emails, raw usernames/post/comment bodies, FCM tokens, full request/response bodies, or secret-bearing URLs. Mechanism: **Measure** — add `apikey` to `httpBlockedHeaders` (`Authorization`/`X-Api-Key`/`Cookie` already blocked by default), keep request/response **bodies off** (Measure default), `httpDisableEventForUrls` on `/auth/*`; **Crashlytics** — no PII into `setCustomKey`/`log`/`recordException`, opaque/hashed `setUserId`; **OkHttp** — `redactHeader("Authorization"/"apikey")` + release `Level.NONE`; optional Timber redacting tree as a logcat safety net. No third-party PII lib, no custom interceptor.

## 16. Observability
All observability is consumed through interfaces in `:core:observability` (`CrashReporter`, `PerformanceTracer`, `AnalyticsLogger`); feature code never touches a vendor SDK directly. These interfaces are **base**; bindings differ by target/environment: the **base starter** ships the real Measure/Firebase composite and requires local/CI config for verification; tests can bind fakes. The **demo** uses the same composite. The interfaces also cover the base's generic HTTP (DummyJSON) — Measure auto-captures it via the shared OkHttp engine.
- **OR-1** **Crash/ANR via `CrashReporter`** — a **composite** fans out to **Measure.sh** and **Firebase Crashlytics** simultaneously (comparison mode), so both dashboards receive each crash; both install chained uncaught-exception handlers and upload their own R8 mapping. Custom keys for user/session context (non-PII). Production can flip the Koin binding to a single backend.
- **OR-2** **Performance via `PerformanceTracer`** — Measure.sh (auto-captures HTTP via its OkHttp instrumentation — OkHttp is Ktor's engine here, so supabase-kt calls are covered — plus ANR + app-start) **and** Firebase Performance, composite. Because Measure auto-instruments HTTP, the manual `HttpMetric`-around-Supabase chore is gone for the Measure path (Firebase Perf still needs it — kept for the comparison).
- **OR-3** **Product analytics via `AnalyticsLogger`** — Firebase Analytics impl only; `NoOp` for tests/`prod`-opt-out. Product events logged from feature modules via the interface only.
- **OR-4** **Comparison is temporary.** Running two crash/perf SDKs adds overhead + double-reporting (counts differ across dashboards) — documented as a deliberate compare-and-choose setup; steady-state apps pick one by changing one composite binding.
- **OR-5** Measure needs a backend (cloud free tier **or** self-host); its API key is a flavor `BuildConfig`/secret (never committed), like Supabase keys.
- **OR-6** **PII/secret redaction (see SR-10).** Because Measure auto-captures HTTP via the OkHttp engine, the contract is enforced by configuration: `apikey` added to Measure's header blocklist (auth/cookie headers already blocked), bodies left off, `/auth/*` events disabled; Crashlytics fed no PII (opaque user id); OkHttp `redactHeader` + release `Level.NONE`. Analytics events use an **allowlist** of names/properties — screen/feature/action/result/error-category/app-version/flavor/device-class/non-PII session id only.
- **OR-7** **Telemetry taxonomy boundaries:** `AnalyticsLogger` is for product events only (screen viewed, auth started/completed, sample opened, post composed, profile edited). `PerformanceTracer` is for timings/spans/network/startup only. `CrashReporter` is for crashes, nonfatal errors, breadcrumbs, and non-PII diagnostic keys only. Do not duplicate product analytics into crash/perf tools; only coarse non-PII context may be attached to crash/perf reports.

## 17. Out of Scope
**Product-specific domain in the base** (social nouns + Supabase belong only to `:demo:twitter:*`, §6.1/NG6); a real backend or persisted writes for the base sample (DummyJSON writes are simulated; the sample is illustrative); the `:feature:imagecrop` cropper as a base feature (it's demo). Also: KMP/CMP; iOS/Wear/TV; bespoke large-screen/foldable UX beyond the P0 adaptive baseline (§8.12) — e.g. multi-pane everywhere, stylus, drag-and-drop, desktop windowing; in the demo — DMs, retweets/quotes, bookmarks, hashtags/mentions, nested comment replies, profile Replies/Media tabs, and video uploads (images only); editable username after onboarding (handle is immutable in v1 — display name/bio/avatar are editable); avatar capture during onboarding (deferred to Edit Profile); in-app notifications cover like/follow/comment only (mentions/reposts deferred); broader media editing (the dynamic `:demo:twitter:feature:imagecrop` does crop only — no filters/annotate/camera); full localization; custom backend beyond Supabase for the demo (Supabase-only demo boundary + escalation gates per NG3 — the one `send-push` Edge Function for FCM is in scope); notification fanout beyond DB triggers + the `send-push` Edge Function; FCM push for likes (comment/follow only); pg_graphql / Apollo GraphQL data path (Supabase GraphQL has no subscriptions and maps per-user computed fields poorly; a GraphQL data source would mirror the REST one structurally — left as a fork exercise); M3 Expressive (until 1.5.0 stable); Sentry; Firebase Dynamic Links; Storybook-style interactive knobs (no production Compose tool in 2026; Storytale is pre-release — tracked, not adopted).

Each milestone is an ownership map, not a duplicate requirement source. `Owns` points to the canonical PRD sections/IDs; `Exit` summarizes the completion outcome; `Verification` names where tests/checks close the milestone. Feature milestones own their local unit/UI/state tests and fakes. M9 owns cross-module verification and CI-level quality gates, not first-pass feature test coverage.

## 19. Setup Checklist

### A. Starter setup (base — **local service config required**)
1. Clone; read the README Getting Started section for required base service config and the manual fork-overwrite checklist. No rename/scaffold script is required.
2. Run `scripts/create-test-credentials.sh` to generate local placeholder config from the committed `*.template` files (one command; produces the ignored `config/<target>/<environment>.properties` + `google-services.json` files so a fresh clone builds without real secrets). Then add required real local config: Firebase `app/src/<environment>/google-services.json` files plus Measure, AdMob, and Branch values in `config/base/<environment>.properties` (`dev`, `staging`, `prod`). Values may be copied from one base service project while this repo is only a template; keep files separate so forks can diverge them.
3. `./gradlew :app:assembleDevDebug` → runs the configured base starter against DummyJSON for auth/sample. `./gradlew :app:check` → green. *(SC-STARTER-1.)*
4. Build your product: overwrite app identity/product bindings per README, replace `:feature:sample` with your first real feature, keep `:core:*` + base features, point `:core:network` at your backend (replace DummyJSON), and bind the real `AuthRepository`.
5. **Delete the demo** when you don't need it: drop `:demo:twitter:*` includes from `settings.gradle.kts` + delete `supabase/` and demo config. Base still builds (SC-ISOLATION-1).
6. *(Optional)* Delete unneeded base feature implementations / optional modules; remove their Koin modules + nav entries. Remove a feature `:api` only after no callers import its route keys.

### B. Twitter-lite demo setup (only to run `:demo:twitter:app`)
7. Create separate demo service projects/placeholders: Supabase, Firebase, Measure, AdMob, and Branch for Twitter-lite. Run `supabase/migrations/` + seeds → put `DEMO_TWITTER_SUPABASE_URL` + anon key and the demo service keys in `config/demo-twitter/<environment>.properties`; put demo Firebase JSON at `demo/twitter/app/src/<environment>/google-services.json`.
8. Create Web + Android OAuth client IDs → configure the Supabase Google provider → `DEMO_TWITTER_GOOGLE_WEB_CLIENT_ID`. Set up the `send-push` Edge Function secret (`supabase secrets set`).
9. `./gradlew :demo:twitter:app:assembleDevDebug` → run. *(SC-DEMO-1.)*

### C. Repo automation (both)
10. **Renovate** self-hosted Action + `renovate.json` ship in the template (free, no Mend account); **Semgrep** SAST + **Dokka** docs run in CI out of the box. Set base service secrets in GitHub **Environments**; demo app-smoke/release secrets are deferred to §22. Edit `.github/CODEOWNERS` for your team paths.

## 22. Post-Implementation Actionables

Deferred items to revisit **once the PRD is implemented** — not v1 blockers, but tracked so they don't get lost:

- **Coverage strategy for Compose UI, navigation wiring, DTOs, and app-screen screenshots** — decide post-implementation how these areas are counted and reported beyond the v1 Kover gate. v1 Kover enforces JVM-testable logic only (data/domain/ViewModels/mappers); UI behavior is covered by targeted Compose tests, DTOs by mapper/serialization tests where practical, and screenshot coverage is limited to the design system/catalog until a broader app-screen strategy is chosen.
- **Passkey auth (P1, flag-gated, default OFF)** — implement enroll + sign-in once `supabase-kt` ships its passkey API ([PR #1327](https://github.com/supabase-community/supabase-kt/pull/1327) — `supabase.auth.passkeys` register/authenticate/manage; native support pending #1291). **No custom server:** Supabase Auth is the WebAuthn relying party (beta — "API may change without notice"); the app side is Credential Manager (`CreatePublicKeyCredentialRequest`/`GetPublicKeyCredentialOption`), private keys never leave the authenticator, only public keys live at the RP. Config: RP ID per env, `android:apk-key-hash` asset association, dashboard enablement, dev/staging/prod origin separation. Surfaces: optional post-onboarding "Add a passkey?" prompt (§9 FR-ONB-5 / FR-DAUTH-5) + Settings enroll/remove — all in `:demo:twitter:feature:auth` (the demo owns the Supabase RP). Routes through the same session/profile-completion gate as Google SSO; cancel / unsupported device / no credential → fall back to Google SSO. Manual-tested, not CI-gated.
- **Release CI + signing + publishing pipeline** — after the template is implemented, add Fastlane-backed release automation: release workflow/tag trigger (or release-please), release signing from CI secrets, signed AAB production, Play Store internal-track upload, Firebase App Distribution tester upload, APK/AAB size reporting, R8 mapping upload to Measure.sh + Crashlytics, and GitHub Environment required-reviewer gates for keystore/Play/FAD secrets. Include the real seeded Supabase `demo-app-smoke` only in this release pipeline and optional manual dispatch, never in default PR/main CI.
- **Provider secrets + provider-smoke workflow** — after Firebase/Measure/AdMob/Branch/Supabase demo projects exist, populate GitHub Environment secrets (Firebase JSON files as Base64 strings, other keys as scalar secrets) and add a manual `provider-smoke` workflow that reconstructs local config files, runs minimal SDK initialization checks, and is approval-gated. Run it manually for provider SDK Renovate PRs after reviewing the diff; do not expose real secrets to default PR checks or arbitrary dependency-update code.

## Appendix B: Decisions & rationale

Stack validated against current (June 2026) modern-Android best practice via parallel web-research passes (architecture · data · testing/perf · platform · backend/CI). Key decisions and the "why" (the full validation record + RFCs have been folded into this PRD and deleted):

- **Navigation 3 (1.1.2), not Nav2.** Stable since Nov 2025; back stack is a plain `SnapshotStateList<Any>`; `koin-compose-navigation3` integrates. (§6.5)
- **State = UDF-MVVM, not MVI.** Immutable `UiState` + `StateFlow`; one-time events as nullable/list state consumed in `LaunchedEffect`, **never** `Channel`/`SharedFlow` (Google UI-events guidance). (§6.3)
- **Modularization = NiA hybrid** (feature + core + build-logic), not by-layer `:data`/`:domain`/`:presentation` modules (an anti-pattern at module granularity). Use-cases live in feature `:impl` until shared. (§6.1–6.2)
- **Networking — no Retrofit.** Base = generic Ktor on the OkHttp engine; demo = supabase-kt over Ktor. One shared `OkHttpClient` with Coil. API mocking via Ktor `MockEngine`. (§5/§6.7)
- **Accompanist dropped** — graduated into Compose/Material3; first-party permission APIs preferred.
- **Coverage = Kover, not JaCoCo** (JaCoCo miscounts Kotlin inline/`copy()`/lambdas/`when`); JVM unit only. (§10/TR-1)
- **Format vs analysis split:** Spotless+ktfmt (format) ; detekt + Android Lint (analysis). (§12)
- **Auth = Credential Manager** (legacy `GoogleSignInClient`/One-Tap deprecated). Base = password flow; demo = Google SSO (federated) + passkey (P1). (§8.2/§9)
- **Deep linking = native App Links + Branch.** Native App Links (`autoVerify` + `assetlinks.json`) are the baseline route contract behind `DeepLinkResolver`; Branch is included by default for deferred deep links. **Firebase Dynamic Links shut down 2025-08-25.** "App Links" (Android) ≠ "Universal Links" (iOS). (§8.9)
- **Force update = two signals:** Play `updatePriority` (fixed at release) + Remote Config `min_required_version` (retroactive gate). (§8.5)
- **AGP 9.2.0 ⇒ Gradle 9.4.1**, JDK 17+, Build Tools 36.0.0, max API 37; `android.newDsl=true` ⇒ convention plugins use `ApplicationExtension`/`androidComponents`. API 37/Android 17 shipped stable (Jun 2026) but stays opt-in (day-zero risk). (§5/§7)
- **Adaptive + a11y are P0** — Material 3 Adaptive, edge-to-edge/insets, predictive back, large font, ATF-backed automated a11y (Compose `enableAccessibilityChecks()` + `roborazzi-accessibility-check` + Lint a11y→error). detekt has no a11y rules; no dedicated a11y GitHub Action — gate via tests+lint. (§8.12–8.13)
- **Facades for service/platform edges only** — Supabase, Firebase surfaces, Branch, AdMob/UMP, Play Core; **not** generic Jetpack/Kotlin libs. (§6.9)
- **Observability = Measure.sh + Firebase composite** behind `CrashReporter`/`PerformanceTracer`/`AnalyticsLogger`; comparison mode, collapsible to one Koin binding. Sentry dropped. (§16)
- **DFM = one optional showcase.** Adopter research: Chromium/Snap/Traveloka/Halodoc use on-demand feature splits; Uber/Spotify/Dropbox/NiA/Cash App ship App Bundle *config* splits instead. Inverted edge quarantined (api-in-base + one-reflection Provider + Koin `loadKoinModules`); Nav3 gate owned. (§6.10)
- **Tooling adds:** Semgrep (SAST, OWASP MASTG + Kotlin), Renovate self-hosted Action (free; Kotlin/KSP co-bump), Dokka 2.2 (multi-module API docs); Dependabot reduced to passive security alerts. (§13)
- **DFM/demo dynamic-feature lib** + **DummyJSON** base backend (public, no key) + **Supabase demo-only** isolation: see §1, §5, §6.

**v1.1 decisions (now folded in; RFCs removed):**
- **Backend security contract** — integrated: authenticated-only reads, per-table RLS, narrow notification mutation, media path-ownership, push-token rules, `security definer` hardening, telemetry allowlist, Supabase escalation gates.
- **Onboarding after SSO** — integrated: `complete_profile` gate replaces auto-seed; username+display-name; immutable handle v1.
- **Passkeys** — deferred to **P1** (§22): Supabase is the WebAuthn RP but `supabase-kt` lacks the API until PR #1327; demo-owned.
- **Demo isolation** — adopted: **two runnable targets** (opinionated & complete base `:app` + Twitter-lite `:demo:twitter:app`). Decision refinements: **Supabase + all social domain are demo-only** (base uses generic Ktor + the public **DummyJSON** API); the **base is feature-rich and opinionated** (Credential Manager username/password auth + a generic posts/users sample over DummyJSON, all platform features, real Firebase/Measure/Ads/Branch integrations configured from local/CI secrets); **Google SSO + passkey moved to the demo** (they need an OAuth/WebAuthn RP the base lacks). Onboarding + image-crop DFM are demo-owned.
